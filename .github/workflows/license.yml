name: license

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Apache license headers
        run: ./scripts/check-license-headers.sh
